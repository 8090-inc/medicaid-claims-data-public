name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8 black isort
      - run: flake8 config/ utils/ scripts/ tests/ --max-line-length 120 --exclude __pycache__
      - run: black --check config/ utils/ scripts/ tests/ --line-length 120
      - run: isort --check-only config/ utils/ scripts/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: python3 -m pytest tests/ -v --tb=short -m "not slow"
      - run: python3 setup_project_foundation.py

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: medicaid-fwa:latest
