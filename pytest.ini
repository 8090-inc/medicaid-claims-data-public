[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require DuckDB or filesystem)
    acceptance: Acceptance tests (verify end-to-end requirements)
    slow: Slow tests (large data, ML models)
addopts = -v --tb=short
